<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson & Syllabus Tracker | Hybrid School ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] {
            display: none !important;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
            color: #111827;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            padding: 0.6rem 1rem;
            color: #64748b;
            font-weight: 500;
            border-radius: 0.5rem;
            transition: all 0.2s;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .sidebar-link:hover {
            color: #0f172a;
            background-color: #f1f5f9;
        }

        .module-active {
            background-color: #eff6ff !important;
            color: #2563eb !important;
        }

        /* Narrow Rail Styles */
        .sidebar-rail {
            background-color: #ffffff;
            border-right: 1px solid #f1f5f9;
            color: #64748b;
            z-index: 50;
        }

        .sidebar-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 14px 0;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            width: 100%;
        }

        .sidebar-item:hover {
            color: #3b82f6;
            background-color: #f8fafc;
        }

        .sidebar-item.active {
            color: #2563eb;
            background-color: #eff6ff;
        }

        .sidebar-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: #2563eb;
            border-radius: 0 4px 4px 0;
        }

        .sidebar-icon {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .sidebar-label {
            font-size: 11px;
            text-align: center;
            line-height: 1.2;
            font-weight: 600;
        }
    </style>
</head>

<body x-data="{ 
    sidebarOpen: true, 
    expandedMenu: 'academics',
    // State
    currentView: 'classes',
    selectedClassData: null,
    
    // Modals
    logLessonModal: false,
    selectedTopic: null,
    selectedChapter: null,
    lessonNotes: '',

    // Mock Data
    teacherClasses: [
        { id: 1, className: 'Class 10-A', subject: 'Mathematics', progress: 46 },
        { id: 2, className: 'Class 9-B', subject: 'Mathematics', progress: 12 }
    ],
    
    chapters: [
        { 
            id: 1, 
            name: 'Chapter 1: Real Numbers', 
            daysPlanned: 5,
            progress: 100,
            status: 'Completed',
            startDate: '2025-01-05',
            completionDate: '2025-01-10', // On time (5 days)
            topics: [
                { id: 101, name: 'Euclidâ€™s Division Lemma', status: 'Completed', completedDate: '2025-01-08', duration: 2 },
                { id: 102, name: 'The Fundamental Theorem of Arithmetic', status: 'Completed', completedDate: '2025-01-09', duration: 2 },
                { id: 103, name: 'Revisiting Irrational Numbers', status: 'Completed', completedDate: '2025-01-10', duration: 1 }
            ]
        },
        { 
            id: 2, 
            name: 'Chapter 2: Polynomials', 
            daysPlanned: 6,
            progress: 50,
            status: 'In Progress',
            startDate: '2025-02-15', // Started recently
            completionDate: null,
            topics: [
                { id: 201, name: 'Geometrical Meaning of the Zeroes', status: 'Completed', completedDate: '2025-02-16', duration: 3 },
                { id: 202, name: 'Relationship between Zeroes and Coefficients', status: 'Pending', completedDate: null, duration: 3 }
            ]
        },
        { 
            id: 3, 
            name: 'Chapter 3: Pair of Linear Equations', 
            daysPlanned: 8,
            progress: 0,
            status: 'Pending',
            startDate: null,
            completionDate: null,
            topics: [
                { id: 301, name: 'Graphical Method of Solution', status: 'Pending', completedDate: null, duration: 4 },
                { id: 302, name: 'Algebraic Methods of Solution', status: 'Pending', completedDate: null, duration: 4 }
            ]
        }
    ],

    openLogModal(topic, chapter) {
        this.selectedTopic = topic;
        this.selectedChapter = chapter;
        this.lessonNotes = '';
        this.logLessonModal = true;
    },

    startTopic(topic, chapter) {
        topic.status = 'In Progress';
        topic.startedDate = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        
        // Update Chapter status to In Progress
        if (chapter.status === 'Pending' || chapter.status === 'Not Started') {
            chapter.status = 'In Progress';
            chapter.startDate = new Date().toISOString().split('T')[0];
        }
        alert(`Started: ${topic.name}`);
    },
    getChapterCompletionStatus(chapter) {
        if (chapter.status !== 'Completed' || !chapter.startDate || !chapter.completionDate) return null;
        
        const start = new Date(chapter.startDate);
        const end = new Date(chapter.completionDate);
        const daysTaken = Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1; // Inclusive
        
        if (daysTaken < chapter.daysPlanned) return { label: 'Early Check-in', color: 'bg-yellow-100 text-yellow-700 border-yellow-200' };
        if (daysTaken > chapter.daysPlanned) return { label: 'Late Completion', color: 'bg-red-100 text-red-700 border-red-200' };
        return { label: 'On Time', color: 'bg-green-100 text-green-700 border-green-200' };
    },

    startTopic(topic) {
        topic.status = 'In Progress';
        topic.startedDate = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        alert(`Started: ${topic.name}`);
    },

    confirmCompletion() {
        if(this.selectedTopic && this.selectedChapter) {
            this.selectedTopic.status = 'Completed';
            this.selectedTopic.completedDate = new Date().toISOString().split('T')[0];
            
            // Recalculate Chapter Progress
            let total = this.selectedChapter.topics.length;
            let completed = this.selectedChapter.topics.filter(t => t.status === 'Completed').length;
            this.selectedChapter.progress = Math.round((completed / total) * 100);
            
            if(this.selectedChapter.progress === 100) {
                this.selectedChapter.status = 'Completed';
                this.selectedChapter.completionDate = new Date().toISOString().split('T')[0];
            }
        }
        this.logLessonModal = false;
        alert('Lesson Logged & Topic Marked as Completed!');
    },

    getStatusColor(status) {
        return status === 'Completed' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-600';
    }

}" class="flex h-screen overflow-hidden">

    <!-- 1. NARROW RAIL SIDEBAR -->
    <aside class="sidebar-rail w-[84px] flex flex-col flex-shrink-0 z-50 h-full shadow-sm relative">

        <!-- Logo -->
        <div class="h-[76px] flex items-center justify-center border-b border-slate-100 flex-shrink-0">
            <div
                class="w-11 h-11 bg-[#2563eb] rounded-xl flex items-center justify-center text-white font-extrabold text-2xl shadow-sm">
                H</div>
        </div>

        <!-- Getting Started -->
        <div class="px-3 mb-5 mt-4">
            <button
                class="w-full py-3.5 bg-[#eff6ff] text-[#2563eb] hover:bg-blue-100 rounded-2xl flex flex-col items-center justify-center transition-colors border border-blue-100/50 shadow-sm">
                <i class="fa-solid fa-rocket text-[17px] mb-1.5"></i>
                <span class="text-[10px] font-bold text-center leading-tight">Quick<br>Start</span>
            </button>
        </div>

        <!-- Nav Items -->
        <nav class="flex-1 pb-4 overflow-y-auto scrollbar-hide flex flex-col items-center">

            <a href="../index.html" class="sidebar-item">
                <i class="fa-solid fa-gauge-high sidebar-icon"></i><span class="sidebar-label">Home</span>
            </a>

            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-bell-concierge sidebar-icon"></i><span
                    class="sidebar-label">Front<br>Office</span>
            </a>

            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-user-plus sidebar-icon"></i><span class="sidebar-label">Admit</span>
            </a>

            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-graduation-cap sidebar-icon"></i><span class="sidebar-label">Student</span>
            </a>

            <a href="#" class="sidebar-item active">
                <i class="fa-solid fa-book-open sidebar-icon"></i><span class="sidebar-label">Academia</span>
            </a>

            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-file-pen sidebar-icon"></i><span class="sidebar-label">Exams</span>
            </a>

            <a href="#" class="sidebar-item">
                <i class="fa-solid fa-users-gear sidebar-icon"></i><span class="sidebar-label">HR</span>
            </a>

            <a href="../finance/index.html" class="sidebar-item">
                <i class="fa-solid fa-coins sidebar-icon"></i><span class="sidebar-label">Finance</span>
            </a>
        </nav>

        <div class="mt-auto pb-6 pt-4 border-t border-slate-100 flex-shrink-0">
            <a href="#" class="sidebar-item !py-2">
                <i class="fa-solid fa-gear sidebar-icon"></i><span class="sidebar-label">Config</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative bg-gray-50">
        <!-- HEADER -->
        <header class="bg-white border-b border-gray-200 h-16 flex items-center justify-between px-8 z-10 sticky top-0">
            <div class="flex items-center gap-4">
                <button @click="sidebarOpen = !sidebarOpen" class="text-slate-400 hover:text-slate-600 md:hidden"><i
                        class="fa-solid fa-bars"></i></button>
                <h2 class="text-lg font-bold text-gray-800">Lesson & Syllabus Tracker</h2>
            </div>
            <div class="flex items-center gap-3">
                <div
                    class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-xs">
                    T</div>
            </div>
        </header>

        <!-- CONTENT -->
        <div class="flex-1 overflow-y-auto p-8 bg-gray-50">

            <!-- MASTER VIEW: TEACHER CLASSES -->
            <div x-show="currentView === 'classes'">
                <div class="mb-6 flex items-start gap-4">
                    <a href="index.html"
                        class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 hover:text-slate-700 transition-colors flex-shrink-0 mt-1 text-base tooltip"
                        title="Back to Dashboard">
                        <i class="fa-solid fa-arrow-left"></i>
                    </a>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">My Syllabuses</h1>
                        <p class="text-gray-500 text-sm mt-1">Select a class to view and update syllabus progress.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <template x-for="tc in teacherClasses" :key="tc.id">
                        <div @click="currentView = 'syllabus'; selectedClassData = tc"
                            class="bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-md transition-shadow cursor-pointer overflow-hidden group">
                            <div class="p-6">
                                <div class="flex justify-between items-start mb-4">
                                    <div>
                                        <div class="text-xs font-bold tracking-wider text-blue-600 uppercase mb-1"
                                            x-text="tc.subject"></div>
                                        <h3 class="text-lg font-bold text-gray-900 group-hover:text-blue-600 transition-colors"
                                            x-text="tc.className"></h3>
                                    </div>
                                    <div
                                        class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
                                        <i class="fa-solid fa-book"></i>
                                    </div>
                                </div>

                                <div>
                                    <div class="flex justify-between text-xs text-gray-500 mb-1.5">
                                        <span>Overall Progress</span>
                                        <span class="font-bold text-gray-700" x-text="`${tc.progress}%`"></span>
                                    </div>
                                    <div class="w-full h-2 bg-gray-100 rounded-full overflow-hidden">
                                        <div class="h-full bg-blue-500 rounded-full" :style="`width: ${tc.progress}%`">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div
                                class="px-6 py-3 bg-gray-50 border-t border-gray-100 flex justify-between items-center text-sm font-medium text-gray-600">
                                <span>View Chapters</span>
                                <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform"></i>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

            <!-- DETAIL VIEW: SPECIFIC CLASS SYLLABUS -->
            <div x-show="currentView === 'syllabus'" x-cloak>
                <div class="flex items-center gap-4 mb-6">
                    <button @click="currentView = 'classes'; selectedClassData = null"
                        class="w-10 h-10 bg-white border border-gray-200 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-50 hover:text-blue-600 transition-colors shadow-sm">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900" x-text="selectedClassData?.subject + ' Syllabus'">
                        </h1>
                        <p class="text-gray-500 text-sm mt-1" x-text="selectedClassData?.className"></p>
                    </div>
                </div>
                <!-- Context Bar -->
                <div class="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mb-6 flex items-center gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 mb-1">Class</label>
                        <select x-model="selectedClass"
                            class="bg-gray-50 border border-gray-200 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-40 p-2">
                            <option>Class 10-A</option>
                            <option>Class 9-B</option>
                        </select>
                    </div>
                    <div class="flex-1 text-right">
                        <div class="text-xs text-gray-500">Overall Progress</div>
                        <div class="text-xl font-bold text-blue-600">46%</div>
                    </div>
                </div>

                <!-- Chapter List -->
                <div class="space-y-4">
                    <template x-for="ch in chapters" :key="ch.id">
                        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden"
                            x-data="{ expanded: false }">
                            <!-- Chapter Header -->
                            <div class="px-6 py-4 bg-gray-50 border-b border-gray-100 flex justify-between items-center cursor-pointer hover:bg-gray-100 transition-colors"
                                @click="expanded = !expanded">
                                <div class="flex-1">
                                    <div class="flex items-center gap-3">
                                        <i class="fa-solid fa-chevron-down text-gray-400 text-xs transition-transform"
                                            :class="expanded ? 'rotate-180' : ''"></i>
                                        <h3 class="font-bold text-gray-900" x-text="ch.name"></h3>
                                        <span
                                            class="text-xs text-gray-500 font-medium bg-white px-2 py-0.5 rounded border border-gray-200 shadow-sm"
                                            x-text="`${ch.daysPlanned} Days Planned`"></span>
                                        <!-- Status Badge -->
                                        <template x-if="getChapterCompletionStatus(ch)">
                                            <span
                                                class="px-2 py-0.5 rounded text-[10px] uppercase font-bold tracking-wider border"
                                                :class="getChapterCompletionStatus(ch).color"
                                                x-text="getChapterCompletionStatus(ch).label">
                                            </span>
                                        </template>
                                    </div>
                                    <div class="flex items-center gap-3 mt-1.5 ml-6">
                                        <div class="w-32 h-1.5 bg-gray-200 rounded-full overflow-hidden">
                                            <div class="h-full bg-blue-500 rounded-full"
                                                :style="`width: ${ch.progress}%`">
                                            </div>
                                        </div>
                                        <span class="text-xs font-semibold text-gray-700"
                                            x-text="`${ch.progress}%`"></span>
                                        <span class="text-xs text-gray-500 ml-1"
                                            x-text="`(${ch.topics.filter(t => t.status === 'Completed').length}/${ch.topics.length} Topics)`"></span>
                                        <span x-show="ch.startDate" class="text-xs text-slate-400 ml-2">Started: <span
                                                x-text="ch.startDate"></span></span>
                                    </div>
                                </div>
                                <span class="text-xs font-mono text-gray-400">CHAPTER</span>
                            </div>

                            <!-- Topics List -->
                            <div class="divide-y divide-gray-100" x-show="expanded" x-collapse>
                                <template x-for="topic in ch.topics" :key="topic.id">
                                    <div
                                        class="px-6 py-4 flex items-center justify-between hover:bg-white transition-colors">
                                        <div class="flex items-center gap-4">
                                            <!-- Status Icon -->
                                            <div class="w-8 h-8 rounded-full flex items-center justify-center border"
                                                :class="{
                                                'bg-green-100 text-green-600 border-green-200': topic.status === 'Completed',
                                                'bg-blue-50 text-blue-600 border-blue-200': topic.status === 'In Progress',
                                                'bg-gray-50 text-gray-300 border-gray-200': topic.status === 'Pending' || topic.status === 'Not Started'
                                            }">
                                                <i class="fa-solid" :class="{
                                                    'fa-check': topic.status === 'Completed',
                                                    'fa-play text-[10px]': topic.status === 'In Progress',
                                                    'fa-circle text-[6px]': topic.status === 'Pending' || topic.status === 'Not Started'
                                                }"></i>
                                            </div>

                                            <div>
                                                <div class="font-medium text-gray-900 text-sm flex items-center gap-2">
                                                    <span x-text="topic.name"></span>
                                                    <span
                                                        class="text-[10px] font-bold tracking-wide text-gray-500 bg-gray-100 uppercase px-2 py-0.5 rounded border border-gray-200"
                                                        x-text="`${topic.duration} Days`"></span>
                                                </div>
                                                <!-- Meta Info -->
                                                <div class="text-xs text-gray-500 mt-0.5 flex gap-2">
                                                    <span x-show="topic.status === 'Completed'">
                                                        Completed on <span x-text="topic.completedDate"
                                                            class="font-medium text-gray-700"></span>
                                                    </span>
                                                    <span x-show="topic.status === 'In Progress'"
                                                        class="text-blue-600 font-medium">
                                                        Started on <span x-text="topic.startedDate"></span>
                                                    </span>
                                                </div>
                                            </div>
                                        </div>

                                        <!-- Actions -->
                                        <div class="flex items-center gap-2">
                                            <!-- Start Button -->
                                            <button
                                                x-show="topic.status === 'Pending' || topic.status === 'Not Started'"
                                                @click="startTopic(topic, ch)"
                                                class="px-3 py-1.5 bg-white border border-gray-200 text-gray-600 text-xs font-medium rounded-lg hover:border-blue-300 hover:text-blue-600 transition-all shadow-sm flex items-center gap-1.5">
                                                <i class="fa-solid fa-play text-[10px]"></i> Start Standard Topic
                                            </button>

                                            <!-- Mark Complete Button -->
                                            <button
                                                x-show="topic.status === 'In Progress' || topic.status === 'Pending'"
                                                @click="openLogModal(topic, ch)"
                                                class="px-3 py-1.5 bg-blue-600 text-white border border-transparent text-xs font-medium rounded-lg hover:bg-blue-700 shadow-sm flex items-center gap-1.5 transition-all">
                                                <i class="fa-solid fa-check"></i> Log Lesson
                                            </button>

                                            <!-- Done Badge -->
                                            <span x-show="topic.status === 'Completed'"
                                                class="px-2.5 py-1 bg-green-50 text-green-700 text-xs font-bold rounded-full border border-green-100 flex items-center gap-1">
                                                Done
                                            </span>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>

            </div>
        </div>
    </main>

    <!-- LOG LESSON MODAL -->
    <div x-show="logLessonModal" x-cloak
        class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden" @click.stop>
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-bold text-gray-900">Log Lesson Entry</h3>
                <button @click="logLessonModal=false" class="text-gray-400 hover:text-gray-600"><i
                        class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Topic</label>
                    <div class="text-sm font-semibold text-gray-900 p-2 bg-gray-50 rounded border border-gray-200"
                        x-text="selectedTopic?.name"></div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1 uppercase">Teacher Notes (Optional)</label>
                    <textarea x-model="lessonNotes" rows="3"
                        class="w-full border border-gray-200 rounded px-3 py-2 text-sm focus:border-blue-500 outline-none"
                        placeholder="E.g., Students struggled with concept X..."></textarea>
                </div>
            </div>
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
                <button @click="logLessonModal=false"
                    class="px-4 py-2 bg-white border border-gray-200 text-gray-600 rounded-lg text-sm font-medium hover:bg-gray-50">Cancel</button>
                <button @click="confirmCompletion()"
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 shadow-sm shadow-blue-200">Confirm
                    & Mark Complete</button>
            </div>
        </div>
    </div>

</body>

</html>
